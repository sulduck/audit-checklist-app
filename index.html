<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>감사 체크리스트</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell" aria-labelledby="app-title">
    <section class="header-panel">
      <p class="eyebrow">업무 점검 관리</p>
      <h1 id="app-title">감사 체크리스트</h1>
      <p class="description">점검 항목을 등록하고 완료 여부를 관리하세요. 입력한 내용은 브라우저에 저장됩니다.</p>
    </section>

    <section class="card" aria-label="점검 항목 입력">
      <form id="checklist-form" class="input-row">
        <label for="item-input" class="sr-only">점검 항목</label>
        <input
          id="item-input"
          type="text"
          maxlength="100"
          placeholder="예: 증빙 서류 제출 여부 확인"
          autocomplete="off"
          required
        >
        <button type="submit" class="primary-button">추가</button>
      </form>
      <p id="form-message" class="form-message" aria-live="polite"></p>
    </section>

    <section class="card checklist-card" aria-label="점검 항목 목록">
      <div class="list-header">
        <h2>점검 항목</h2>
        <span id="item-count" class="item-count">0건</span>
      </div>
      <ul id="checklist" class="checklist"></ul>
      <p id="empty-state" class="empty-state">등록된 점검 항목이 없습니다. 새 항목을 추가해 주세요.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
